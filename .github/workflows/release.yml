name: Release macOS app

on:
  push:
    branches: [main]
    paths:
      - "macos/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release app bundle
        run: bash macos/build-app.sh

      # Zip on the same macOS runner so the .app bundle stays valid. Uploading the raw .app
      # directory as an artifact can strip the outer *.app folder (only Contents/ arrives).
      - name: Zip app bundle for artifact
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent "macos/Dynamic Island.app" DynamicIsland-macos.zip
          ls -la DynamicIsland-macos.zip

      - name: Upload built zip
        uses: actions/upload-artifact@v4
        with:
          name: Dynamic-Island-app
          path: DynamicIsland-macos.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download built app
        uses: actions/download-artifact@v4
        with:
          name: Dynamic-Island-app
          path: ./artifact

      - name: Prepare release asset
        run: |
          set -euo pipefail
          ZIP=$(find ./artifact -name "*.zip" -type f -print | head -1)
          if [ -z "$ZIP" ]; then
            echo "No zip under ./artifact"; ls -laR ./artifact; exit 1
          fi
          cp "$ZIP" DynamicIsland-macos.zip
          ls -la DynamicIsland-macos.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Dynamic Island build ${{ github.run_number }}"
          body: |
            Automated build from [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            Download **DynamicIsland-macos.zip**, unzip, and move **Dynamic Island.app** to `/Applications` (or open it from anywhere).
          files: DynamicIsland-macos.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
